<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EE.CD - 免费域名 ｜ Free Subdomain</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2b0854 0%, #491375 50%, #1e053a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 语言切换按钮挂在右上角 */
        .lang-switch-btn {
            position: absolute;
            top: 20px;
            right: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            z-index: 100;
            transition: background 0.2s;
        }
        .lang-switch-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 右上角全新“注册”按钮样式 */
        .register-top-btn {
            position: absolute;
            top: 20px;
            right: 130px;
            background: linear-gradient(135deg, #ffba5a, #ff9100);
            border: none;
            color: #fff;
            padding: 8px 22px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 100;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(255, 145, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .register-top-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 145, 0, 0.5);
        }

        /* 背景装饰山脉效果 */
        .bg-wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23380c64" fill-opacity="0.4" d="M0,224L120,208C240,192,480,160,720,165.3C960,171,1200,213,1320,234.7L1440,256L1440,320L1320,320C1200,320,960,320,720,320C480,320,240,320,120,320L0,320Z"></path></svg>') no-repeat bottom;
            background-size: cover;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            align-items: center;
            gap: 20px;
            z-index: 2;
        }

        @media (max-width: 950px) {
            .container {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .ball-container {
                justify-content: center !important;
                height: 400px !important;
                margin-left: 0 !important;
            }
            .features-grid {
                justify-content: center !important;
            }
        }

        /* 左侧搜索区域 */
        .search-section {
            display: flex;
            flex-direction: column;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ff9d2e, #dd2476);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            position: relative;
        }
        .logo-icon::after {
            content: '';
            position: absolute;
            top: 15%; left: 15%; right: 15%; bottom: 15%;
            background: #2b0854;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #d1c4e9;
            line-height: 1.6;
            margin-bottom: 25px;
            max-width: 500px;
        }

        /* 新增：特性标签展示组 */
        .features-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }
        .feature-badge {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .feature-badge .icon {
            font-size: 1rem;
        }

        /* 搜索框群组 */
        .search-group {
            position: relative;
            margin-bottom: 25px;
            max-width: 550px;
        }

        .search-input-wrapper {
            display: flex;
            align-items: center;
            background: #ffffff;
            border-radius: 50px;
            padding: 6px 6px 6px 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .search-icon {
            color: #757575;
            margin-right: 12px;
            display: flex;
            align-items: center;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1.1rem;
            color: #333333;
            padding: 10px 0;
            background: transparent;
        }

        .suffix-select {
            border: none;
            outline: none;
            background: #f5f5f5;
            color: #333;
            padding: 10px 15px;
            border-radius: 20px;
            margin-right: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .search-btn {
            background: linear-gradient(135deg, #ffba5a, #ff9100);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .search-btn:hover {
            transform: scale(1.05);
        }

        .search-btn svg {
            fill: #ffffff;
            width: 20px;
            height: 20px;
        }

        /* 推荐后缀快捷面板 */
        .quick-suffixes {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 550px;
            font-size: 0.9rem;
        }

        .suffix-item {
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .suffix-item:hover {
            opacity: 0.8;
        }

        .suffix-name { color: #ff9100; font-weight: bold; }
        .suffix-name.alt1 { color: #ff76b7; }
        .suffix-name.alt2 { color: #00e676; }
        .suffix-name.alt3 { color: #29b6f6; }

        .suffix-price { color: #b39ddb; margin-left: 4px; }

        /* 结果展示面板 */
        .result-panel {
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: 12px;
            max-width: 550px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .result-available { background: rgba(0, 230, 118, 0.15); border: 1px solid #00e676; color: #00e676; }
        .result-taken { background: rgba(255, 23, 68, 0.15); border: 1px solid #ff1744; color: #ff1744; }
        .result-loading { background: rgba(255, 255, 255, 0.1); border: 1px solid #fff; color: #fff; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 右侧 动态 3D 旋转球区域 */
        .ball-container {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            height: 550px;
            position: relative;
            margin-left: -40px;
        }

        .grav-ball-wrapper {
            position: relative;
            width: 500px;
            height: 500px;
        }

        .domain-node {
            position: absolute;
            pointer-events: auto;
            cursor: pointer;
            user-select: none;
            text-decoration: none;
            font-size: 13px;
            white-space: nowrap;
            font-weight: 500;
            will-change: transform, opacity;
            transition: color 0.1s, text-shadow 0.2s;
        }

        .domain-node:hover {
            color: #ff9100 !important;
            font-weight: bold;
            text-shadow: 0 0 12px rgba(255,145,0,0.9) !important;
            filter: blur(0px) !important;
            z-index: 99999 !important;
        }

    </style>
</head>
<body>
    <a href="https://eecd.cc/" class="register-top-btn" id="regBtn">注册</a>
    <button class="lang-switch-btn" id="langBtn" onclick="toggleLanguage()">English</button>
    <div class="bg-wave"></div>

    <div class="container">
        <div class="search-section">
            <div class="logo-area">
                <div class="logo-icon"></div>
                <span class="logo-text">EE.CD</span>
            </div>
            <p class="subtitle" id="transSubtitle">
                优质域名后缀正在变得越来越稀缺。ee.cd 为您提供自由注册心仪域名的无限可能，助您快速锁定专属的互联网黄金资产。
            </p>

            <div class="features-grid">
                <div class="feature-badge">
                    <span class="icon" style="color: #00e676;">🎁</span>
                    <span id="fFree">首年免费注册</span>
                </div>
                <div class="feature-badge">
                    <span class="icon" style="color: #29b6f6;">🎓</span>
                    <span id="fStudent">学生扶持计划 (教育邮箱)</span>
                </div>
                <div class="feature-badge">
                    <span class="icon" style="color: #ff9100;">🛡️</span>
                    <span id="fSsl">一键自动生成 SSL 证书</span>
                </div>
            </div>

            <div class="search-group">
                <div class="search-input-wrapper">
                    <div class="search-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </div>
                    <input type="text" id="domainInput" class="search-input" placeholder="请输入你要查询的前缀，例如: myname">
                    <select id="suffixSelect" class="suffix-select"></select>
                    <button id="searchBtn" class="search-btn">
                        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    </button>
                </div>
            </div>

            <div class="quick-suffixes" id="quickPanel"></div>
            <div class="result-panel" id="resultPanel"></div>
        </div>

        <div class="ball-container">
            <div class="grav-ball-wrapper" id="gravityBall"></div>
        </div>
    </div>

    <script>
        // ==================== 多语言字典字典 ====================
        let currentLang = 'zh';
        const i18n = {
            zh: {
                langBtn: "English",
                regBtn: "注册",
                subtitle: "优质域名后缀正在变得越来越稀缺。ee.cd 为您提供自由注册心仪域名的无限可能，助您快速锁定专属的互联网黄金资产。",
                fFree: "首年免费注册",
                fStudent: "学生扶持计划 (教育邮箱优惠)",
                fSsl: "一键生成 SSL 证书",
                placeholder: "请输入你要查询的前缀，例如: myname",
                alertEmpty: "请先输入域名主体前缀！",
                loading: "正在查询 {domain} 的注册状态，请稍候...",
                available: "恭喜！域名 <strong>{domain}</strong> 尚未被注册，可以注册！",
                taken: "很抱歉，域名 <strong>{domain}</strong> 已经被注册。",
                errorDone: "查询完成。如果该域名未被锁定，通常 <strong>{domain}</strong> 是可注册状态！",
                priceTag: "首年免费 / 续费低廉"
            },
            en: {
                langBtn: "简体中文",
                regBtn: "Register",
                subtitle: "Premium domain extensions are becoming increasingly scarce. ee.cd offers you unlimited possibilities to register your desired domains and lock down your digital assets.",
                fFree: "Free for the First Year",
                fStudent: "Student Support (Edu Email Discount)",
                fSsl: "1-Click Free SSL Generation",
                placeholder: "Enter domain prefix, e.g. myname",
                alertEmpty: "Please enter a domain prefix first!",
                loading: "Checking availability for {domain}, please wait...",
                available: "Congratulations! <strong>{domain}</strong> is available for registration!",
                taken: "Sorry, <strong>{domain}</strong> has already been registered.",
                errorDone: "Check complete. If not locked, <strong>{domain}</strong> is generally available!",
                priceTag: "1st Year Free / Cheap Renew"
            }
        };

        // ==================== 基础配置 ====================
        const baseSuffixes = ["ee.cd", "my.uy", "ad.sd", "vps.cd", "love.gd", "wxyz.cc", "g201.com"];
        const colorClasses = ["", "alt1", "alt2", "alt3"];
        const suffixSelect = document.getElementById('suffixSelect');
        const quickPanel = document.getElementById('quickPanel');

        // 初始化左侧下拉框和快捷面板
        baseSuffixes.forEach((sfx, index) => {
            const opt = document.createElement('option');
            opt.value = sfx;
            opt.textContent = `.${sfx}`;
            suffixSelect.appendChild(opt);

            const colorClass = colorClasses[index % colorClasses.length];
            const item = document.createElement('div');
            item.className = 'suffix-item';
            item.setAttribute('data-sfx', sfx);
            // 初始时使用中文价格文本，后面通过多语言刷新
            item.innerHTML = `<span class="suffix-name ${colorClass}">${sfx}</span><span class="suffix-price price-label">首年免费</span>`;
            item.onclick = () => { suffixSelect.value = sfx; triggerSearch(); };
            quickPanel.appendChild(item);
        });

        const domainInput = document.getElementById('domainInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultPanel = document.getElementById('resultPanel');

        // 切换语言方法
        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            const dict = i18n[currentLang];
            
            // 刷新静态文本
            document.getElementById('langBtn').textContent = dict.langBtn;
            document.getElementById('regBtn').textContent = dict.regBtn;
            document.getElementById('transSubtitle').textContent = dict.subtitle;
            document.getElementById('fFree').textContent = dict.fFree;
            document.getElementById('fStudent').textContent = dict.fStudent;
            document.getElementById('fSsl').textContent = dict.fSsl;
            domainInput.placeholder = dict.placeholder;

            // 刷新快捷面板里的价格描述
            const priceLabels = document.querySelectorAll('.price-label');
            priceLabels.forEach(label => {
                label.textContent = dict.priceTag;
            });

            // 清空结果栏以免语境对不上
            resultPanel.style.display = 'none';
        }

        // 核心 API 查询逻辑
        async function triggerSearch() {
            const prefix = domainInput.value.trim().replace(/^[.\s]+|[.\s]+$/g, '');
            const suffix = suffixSelect.value;
            const dict = i18n[currentLang];

            if (!prefix) { alert(dict.alertEmpty); domainInput.focus(); return; }
            const fullDomain = `${prefix}.${suffix}`;
            
            resultPanel.style.display = 'block';
            resultPanel.className = 'result-panel result-loading';
            resultPanel.innerHTML = dict.loading.replace('{domain}', fullDomain);

            try {
                const response = await fetch(`https://eecd.cc/api.php?cmd=rdap&domain=${encodeURIComponent(fullDomain)}`);
                const data = await response.json();
                if (data.status === "available" || data.errorCode === 404 || (!data.ldhName && !data.handle)) {
                    resultPanel.className = 'result-panel result-available';
                    resultPanel.innerHTML = dict.available.replace('{domain}', fullDomain);
                } else {
                    resultPanel.className = 'result-panel result-taken';
                    resultPanel.innerHTML = dict.taken.replace('{domain}', fullDomain);
                }
            } catch (error) {
                resultPanel.className = 'result-panel result-available';
                resultPanel.innerHTML = dict.errorDone.replace('{domain}', fullDomain);
            }
        }
        searchBtn.onclick = triggerSearch;
        domainInput.onkeydown = (e) => { if(e.key === 'Enter') triggerSearch(); };


        // ==================== 右侧 经典 3D 旋转球内核 ====================
        const ballContainer = document.getElementById('gravityBall');
        
        const DENSITY = 180;          
        const SPHERE_RADIUS = 200;    
        const FOCAL_LENGTH = 300;     
        
        // 保持向左旋转的负向参数
        let angleX = 0.003; 
        let angleY = -0.003; 

        const domainItems = [];
        let isHoveringNode = false;   

        for (let i = 0; i < DENSITY; i++) {
            const phi = Math.acos(-1 + (2 * i) / DENSITY);
            const theta = Math.sqrt(DENSITY * Math.PI) * phi;

            const sfx = baseSuffixes[i % baseSuffixes.length];
            const text = `.${sfx}`;

            const nodeElem = document.createElement('a');
            nodeElem.className = 'domain-node';
            nodeElem.textContent = text;
            
            const r = 210 + Math.random() * 45;
            const g = i % 2 === 0 ? (180 + Math.random() * 50) : (220 + Math.random() * 35);
            const b = 255;
            const baseOpacity = 0.3 + Math.random() * 0.7; 
            nodeElem.style.color = `rgba(${r}, ${g}, ${b}, ${baseOpacity})`;

            ballContainer.appendChild(nodeElem);

            domainItems.push({
                element: nodeElem,
                x: SPHERE_RADIUS * Math.sin(phi) * Math.cos(theta),
                y: SPHERE_RADIUS * Math.sin(phi) * Math.sin(theta),
                z: SPHERE_RADIUS * Math.cos(phi),
                baseOpacity: baseOpacity
            });

            nodeElem.addEventListener('click', (e) => {
                e.preventDefault();
                suffixSelect.value = sfx;
            });

            nodeElem.addEventListener('mouseenter', () => { isHoveringNode = true; });
            nodeElem.addEventListener('mouseleave', () => { isHoveringNode = false; });
        }

        window.addEventListener('mousemove', (e) => {
            const rect = ballContainer.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            
            const dx = e.clientX - cx;
            const dy = e.clientY - cy;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < SPHERE_RADIUS * 2.5 && !isHoveringNode) {
                angleY = dx * -0.0001;
                angleX = -dy * 0.0001;
            } else if (!isHoveringNode) {
                angleX += (0.003 - angleX) * 0.05;
                angleY += (-0.003 - angleY) * 0.05;
            }
        });

        function render3DCloud() {
            const cosX = Math.cos(angleX);
            const sinX = Math.sin(angleX);
            const cosY = Math.cos(angleY);
            const sinY = Math.sin(angleY);

            if (!isHoveringNode) {
                domainItems.forEach(item => {
                    const y1 = item.y * cosX - item.z * sinX;
                    const z1 = item.z * cosX + item.y * sinX;
                    
                    const x2 = item.x * cosY - z1 * sinY;
                    const z2 = z1 * cosY + item.x * sinY;

                    item.x = x2;
                    item.y = y1;
                    item.z = z2;
                });
            }

            const cx = ballContainer.offsetWidth / 2;
            const cy = ballContainer.offsetHeight / 2;

            domainItems.forEach(item => {
                const scale = FOCAL_LENGTH / (FOCAL_LENGTH - item.z);
                const left = (item.x * scale + cx - item.element.offsetWidth / 2).toFixed(1);
                const top = (item.y * scale + cy - item.element.offsetHeight / 2).toFixed(1);
                const blur = Math.max(0, (SPHERE_RADIUS - item.z) / 25);
                const opacity = Math.min(1, Math.max(0.1, item.baseOpacity * scale)).toFixed(2);

                item.element.style.transform = `translate(${left}px, ${top}px) scale(${scale.toFixed(2)})`;
                item.element.style.opacity = opacity;
                item.element.style.filter = `blur(${blur.toFixed(1)}px)`;
                item.element.style.zIndex = Math.floor(scale * 1000);

                if (item.z > 50) {
                    item.element.style.textShadow = `0 0 ${Math.floor(scale * 4)}px rgba(255,255,255,0.5)`;
                } else {
                    item.element.style.textShadow = 'none';
                }
            });

            requestAnimationFrame(render3DCloud);
        }

        // 默认初始化多语言标签
        toggleLanguage(); // 执行一次切换至默认中文初始化标签状态
        currentLang = 'zh'; // 重置语言标定

        render3DCloud();
    </script>
</body>
</html>
